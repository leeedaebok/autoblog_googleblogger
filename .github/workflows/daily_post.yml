name: Daily Blog Post

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 환경 설정 및 파일 복원
      # 깃허브 비밀키(Secrets)를 이용해 필요한 파일들을 다시 만들어냅니다.
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" >> .env
        echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > client_secret.json
        echo "${{ secrets.GOOGLE_TOKEN_BASE64 }}" | base64 -d > token.pickle

    - name: 블로그 포스팅 실행
      run: python main.py